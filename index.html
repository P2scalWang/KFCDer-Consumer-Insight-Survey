<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KFCDer Consumer Insight Survey</title>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;500;600&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --primary-color: #E4002B; 
            --primary-gradient: linear-gradient(135deg, #E4002B 0%, #ff416c 100%);
            --bg-color: #f4f7f6;
            --card-bg: #ffffff;
            --text-main: #2c3e50;
            --text-muted: #7f8c8d;
            --border-light: #e0e6ed;
            --hover-bg: #fff0f2;
        }

        * { box-sizing: border-box; font-family: 'Kanit', sans-serif; margin: 0; padding: 0; }
        body { background-color: var(--bg-color); color: var(--text-main); padding: 40px 20px; display: flex; justify-content: center; }
        
        .survey-container {
            background-color: var(--card-bg);
            max-width: 800px; width: 100%;
            border-radius: 24px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.05);
            padding: 50px 40px; position: relative;
        }
        .survey-container::before { content: ''; position: absolute; top: 0; left: 0; width: 100%; height: 8px; background: var(--primary-gradient); }
        .header-banner { width: 100%; height: 150px; border-radius: 16px; object-fit: cover; margin-bottom: 20px; }
        .header { text-align: center; margin-bottom: 40px; }
        .header h1 { color: var(--primary-color); font-size: 2.2rem; margin-bottom: 10px; }
        
        fieldset { border: none; margin-bottom: 40px; }
        legend { font-size: 1.5rem; font-weight: 600; color: var(--text-main); margin-bottom: 25px; padding-bottom: 10px; border-bottom: 2px solid var(--border-light); width: 100%; display: block; }
        .question-group { margin-bottom: 30px; }
        .question-label { display: block; font-size: 1.15rem; font-weight: 500; margin-bottom: 15px; color: #34495e; }
        
        /* ตารางจัดวางตัวเลือกแบบการ์ด */
        .options-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 15px; }
        .radio-btn input[type="radio"] { display: none; }
        .radio-btn span {
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            padding: 15px; background-color: #f8f9fa; border: 2px solid var(--border-light);
            border-radius: 16px; cursor: pointer; transition: all 0.3s ease; height: 100%; text-align: center;
        }
        .option-image { width: 100%; height: 100px; object-fit: cover; border-radius: 10px; margin-bottom: 12px; transition: all 0.3s ease; }
        .option-text { font-size: 1.05rem; color: var(--text-muted); font-weight: 500; }
        
        .radio-btn:hover span { border-color: var(--primary-color); background-color: var(--hover-bg); transform: translateY(-3px); box-shadow: 0 5px 15px rgba(228, 0, 43, 0.1); }
        .radio-btn input[type="radio"]:checked + span { border-color: var(--primary-color); background-color: var(--hover-bg); box-shadow: 0 0 0 2px var(--primary-color); }
        .radio-btn input[type="radio"]:checked + span .option-text { color: var(--primary-color); font-weight: 600; }
        
        .submit-btn {
            width: 100%; padding: 18px; background: var(--primary-gradient); color: white; border: none;
            border-radius: 16px; font-size: 1.3rem; font-weight: 600; cursor: pointer; margin-top: 20px; transition: all 0.3s ease;
        }
        .submit-btn:hover { transform: translateY(-3px); box-shadow: 0 15px 35px rgba(228, 0, 43, 0.4); }
        .submit-btn:disabled { background: #ccc; cursor: not-allowed; transform: none; box-shadow: none; }
        
        @media (max-width: 600px) {
            .survey-container { padding: 30px 20px; }
            .header h1 { font-size: 1.8rem; }
            .question-label { font-size: 1.05rem; }
        }
    </style>
</head>
<body>

    <div class="survey-container">
        <img src="https://images.unsplash.com/photo-1513639776629-7b61b0ac49cb?q=80&w=1000&auto=format&fit=crop" alt="KFCDer Banner" class="header-banner">
        
        <header class="header">
            <h1>KFCDer Insight Survey</h1>
            <p>ร่วมแชร์ไอเดียสร้างประสบการณ์ Swipe Your Soul ในแบบของคุณ</p>
        </header>

        <form id="surveyForm">
            
            <fieldset>
                <legend>👤 ข้อมูลส่วนตัว</legend>
                <div class="question-group">
                    <label class="question-label">1. อายุของคุณ</label>
                    <div class="options-grid">
                        <label class="radio-btn"><input type="radio" name="age" value="ต่ำกว่า 18 ปี"><span><div class="option-text">ต่ำกว่า 18 ปี</div></span></label>
                        <label class="radio-btn"><input type="radio" name="age" value="18-22 ปี"><span><div class="option-text">18-22 ปี</div></span></label>
                        <label class="radio-btn"><input type="radio" name="age" value="23-27 ปี"><span><div class="option-text">23-27 ปี</div></span></label>
                        <label class="radio-btn"><input type="radio" name="age" value="28 ปีขึ้นไป"><span><div class="option-text">28 ปีขึ้นไป</div></span></label>
                    </div>
                </div>
                <div class="question-group">
                    <label class="question-label">2. สถานะปัจจุบัน</label>
                    <div class="options-grid">
                        <label class="radio-btn"><input type="radio" name="status" value="นักเรียน / นักศึกษา"><span><div class="option-text">นักเรียน / นักศึกษา</div></span></label>
                        <label class="radio-btn"><input type="radio" name="status" value="พนักงานบริษัท"><span><div class="option-text">พนักงานบริษัท</div></span></label>
                        <label class="radio-btn"><input type="radio" name="status" value="ธุรกิจส่วนตัว"><span><div class="option-text">ธุรกิจส่วนตัว</div></span></label>
                        <label class="radio-btn"><input type="radio" name="status" value="อื่น ๆ"><span><div class="option-text">อื่น ๆ</div></span></label>
                    </div>
                </div>
            </fieldset>

            <fieldset>
                <legend>🎯 Insight Question</legend>
                <div class="question-group">
                    <label class="question-label">1. ปกติคุณเลือกเมนูของ KFC จากอะไรเป็นหลัก</label>
                    <div class="options-grid">
                        <label class="radio-btn"><input type="radio" name="iq1" value="โปรโมชั่น"><span><div class="option-text">โปรโมชั่น</div></span></label>
                        <label class="radio-btn"><input type="radio" name="iq1" value="เมนูที่ชอบอยู่แล้ว"><span><div class="option-text">เมนูที่ชอบอยู่แล้ว</div></span></label>
                        <label class="radio-btn"><input type="radio" name="iq1" value="เพื่อนแนะนำ"><span><div class="option-text">เพื่อนแนะนำ</div></span></label>
                        <label class="radio-btn"><input type="radio" name="iq1" value="ความสะดวก"><span><div class="option-text">ความสะดวก</div></span></label>
                    </div>
                </div>
                <div class="question-group">
                    <label class="question-label">2. เวลาเลือกเมนู คุณชอบอะไรที่สุด</label>
                    <div class="options-grid">
                        <label class="radio-btn">
                            <input type="radio" name="iq2" value="ไก่ทอด">
                            <span><img src="https://images.unsplash.com/photo-1626082927389-6cd097cdc6ec?q=80&w=500&auto=format&fit=crop" class="option-image"><div class="option-text">ไก่ทอด</div></span>
                        </label>
                        <label class="radio-btn">
                            <input type="radio" name="iq2" value="เบอร์เกอร์">
                            <span><img src="https://images.unsplash.com/photo-1568901346375-23c9450c58cd?q=80&w=500&auto=format&fit=crop" class="option-image"><div class="option-text">เบอร์เกอร์</div></span>
                        </label>
                        <label class="radio-btn">
                            <input type="radio" name="iq2" value="เมนูข้าว">
                            <span><img src="https://cms.dmpcdn.com/food/2025/01/03/d17166e0-c988-11ef-bca8-db16b321fe07_webp_original.webp" class="option-image"><div class="option-text">เมนูข้าว</div></span>
                        </label>
                        <label class="radio-btn">
                            <input type="radio" name="iq2" value="ของทานเล่น">
                            <span><img src="https://images.unsplash.com/photo-1576107232684-1279f390859f?q=80&w=500&auto=format&fit=crop" class="option-image"><div class="option-text">ของทานเล่น</div></span>
                        </label>
                    </div>
                </div>
                <div class="question-group">
                    <label class="question-label">3. คุณเคยรู้สึกว่าเมนูใน KFC เลือกยากหรือไม่</label>
                    <div class="options-grid">
                        <label class="radio-btn"><input type="radio" name="iq3" value="บ่อยครั้ง"><span><div class="option-text">บ่อยครั้ง</div></span></label>
                        <label class="radio-btn"><input type="radio" name="iq3" value="บางครั้ง"><span><div class="option-text">บางครั้ง</div></span></label>
                        <label class="radio-btn"><input type="radio" name="iq3" value="ไม่เคย"><span><div class="option-text">ไม่เคย</div></span></label>
                    </div>
                </div>
                <div class="question-group">
                    <label class="question-label">4. คุณคิดว่าฟีเจอร์ที่ช่วย “จับคู่เมนูที่เข้ากัน” ให้คุณอัตโนมัติ จะช่วยให้เลือกอาหารง่ายขึ้นหรือไม่</label>
                    <div class="options-grid">
                        <label class="radio-btn"><input type="radio" name="iq4" value="ง่ายขึ้นมาก"><span><div class="option-text">ง่ายขึ้นมาก</div></span></label>
                        <label class="radio-btn"><input type="radio" name="iq4" value="ง่ายขึ้นเล็กน้อย"><span><div class="option-text">ง่ายขึ้นเล็กน้อย</div></span></label>
                        <label class="radio-btn"><input type="radio" name="iq4" value="ไม่ต่าง"><span><div class="option-text">ไม่ต่าง</div></span></label>
                    </div>
                </div>
                <div class="question-group">
                    <label class="question-label">5. คุณคิดว่าไอเดียการ “Matching เมนู เพื่อสร้าง Bucket ในแบบของตัวเอง” น่าสนใจแค่ไหน</label>
                    <div class="options-grid">
                        <label class="radio-btn"><input type="radio" name="iq5" value="น่าสนใจมาก"><span><div class="option-text">น่าสนใจมาก</div></span></label>
                        <label class="radio-btn"><input type="radio" name="iq5" value="ค่อนข้างน่าสนใจ"><span><div class="option-text">ค่อนข้างน่าสนใจ</div></span></label>
                        <label class="radio-btn"><input type="radio" name="iq5" value="เฉย ๆ"><span><div class="option-text">เฉย ๆ</div></span></label>
                        <label class="radio-btn"><input type="radio" name="iq5" value="ไม่น่าสนใจ"><span><div class="option-text">ไม่น่าสนใจ</div></span></label>
                    </div>
                </div>
                <div class="question-group">
                    <label class="question-label">6. คุณคิดว่าการปัดเลือกเมนูจะทำให้การสั่งอาหารสนุกขึ้นหรือไม่</label>
                    <div class="options-grid">
                        <label class="radio-btn"><input type="radio" name="iq6" value="มาก"><span><div class="option-text">มาก</div></span></label>
                        <label class="radio-btn"><input type="radio" name="iq6" value="ปานกลาง"><span><div class="option-text">ปานกลาง</div></span></label>
                        <label class="radio-btn"><input type="radio" name="iq6" value="น้อย"><span><div class="option-text">น้อย</div></span></label>
                    </div>
                </div>
                <div class="question-group">
                    <label class="question-label">7. ถ้ามีฟีเจอร์นี้ในแอป KFC คุณมีโอกาสลองใช้หรือไม่</label>
                    <div class="options-grid">
                        <label class="radio-btn"><input type="radio" name="iq7" value="แน่นอน"><span><div class="option-text">แน่นอน</div></span></label>
                        <label class="radio-btn"><input type="radio" name="iq7" value="อาจจะลอง"><span><div class="option-text">อาจจะลอง</div></span></label>
                        <label class="radio-btn"><input type="radio" name="iq7" value="ไม่แน่ใจ"><span><div class="option-text">ไม่แน่ใจ</div></span></label>
                        <label class="radio-btn"><input type="radio" name="iq7" value="ไม่ใช้"><span><div class="option-text">ไม่ใช้</div></span></label>
                    </div>
                </div>
            </fieldset>

            <fieldset>
                <legend>🍗 พฤติกรรมผู้บริโภค</legend>
                <div class="question-group">
                    <label class="question-label">1. คุณมักไปทาน KFC กับใครบ่อยที่สุด?</label>
                    <div class="options-grid">
                        <label class="radio-btn"><input type="radio" name="cb_who" value="คนเดียว"><span><div class="option-text">คนเดียว</div></span></label>
                        <label class="radio-btn"><input type="radio" name="cb_who" value="เพื่อน"><span><div class="option-text">เพื่อน</div></span></label>
                        <label class="radio-btn"><input type="radio" name="cb_who" value="แฟน / แฟน(เก่า)"><span><div class="option-text">แฟน / แฟน(เก่า)</div></span></label>
                        <label class="radio-btn"><input type="radio" name="cb_who" value="ครอบครัว"><span><div class="option-text">ครอบครัว</div></span></label>
                    </div>
                </div>
                <div class="question-group">
                    <label class="question-label">2. คอนเทนต์แบบไหนทำให้คุณอยากซื้อ KFC มากที่สุด</label>
                    <div class="options-grid">
                        <label class="radio-btn"><input type="radio" name="cb_content" value="คลิปไวรัล / ตลก"><span><div class="option-text">คลิปไวรัล / ตลก</div></span></label>
                        <label class="radio-btn"><input type="radio" name="cb_content" value="รีวิวอาหาร"><span><div class="option-text">รีวิวอาหาร</div></span></label>
                        <label class="radio-btn"><input type="radio" name="cb_content" value="อินฟลูเอนเซอร์"><span><div class="option-text">อินฟลูเอนเซอร์</div></span></label>
                        <label class="radio-btn"><input type="radio" name="cb_content" value="โปรโมชั่นลดราคา"><span><div class="option-text">โปรโมชั่นลดราคา</div></span></label>
                        <label class="radio-btn"><input type="radio" name="cb_content" value="แคมเปญเรื่องราว (Storytelling)"><span><div class="option-text">แคมเปญเรื่องราว<br>(Storytelling)</div></span></label>
                    </div>
                </div>
                <div class="question-group">
                    <label class="question-label">3. คุณทาน KFC บ่อยแค่ไหน</label>
                    <div class="options-grid">
                        <label class="radio-btn"><input type="radio" name="cb1" value="สัปดาห์ละครั้ง"><span><div class="option-text">สัปดาห์ละครั้ง</div></span></label>
                        <label class="radio-btn"><input type="radio" name="cb1" value="เดือนละ 1–2 ครั้ง"><span><div class="option-text">เดือนละ 1–2 ครั้ง</div></span></label>
                        <label class="radio-btn"><input type="radio" name="cb1" value="นาน ๆ ครั้ง"><span><div class="option-text">นาน ๆ ครั้ง</div></span></label>
                    </div>
                </div>
                <div class="question-group">
                    <label class="question-label">4. คุณเคยใช้แอปของ KFC หรือไม่</label>
                    <div class="options-grid">
                        <label class="radio-btn"><input type="radio" name="cb2" value="เคยใช้"><span><div class="option-text">เคยใช้</div></span></label>
                        <label class="radio-btn"><input type="radio" name="cb2" value="ไม่เคยใช้"><span><div class="option-text">ไม่เคยใช้</div></span></label>
                    </div>
                </div>
                <div class="question-group">
                    <label class="question-label">5. เวลาสั่ง KFC คุณชอบเลือกเมนูเองหรือสั่งตามเซตที่มีอยู่</label>
                    <div class="options-grid">
                        <label class="radio-btn"><input type="radio" name="cb3" value="เลือกเอง"><span><div class="option-text">เลือกเอง</div></span></label>
                        <label class="radio-btn"><input type="radio" name="cb3" value="สั่งเป็นเซต"><span><div class="option-text">สั่งเป็นเซต</div></span></label>
                        <label class="radio-btn"><input type="radio" name="cb3" value="แล้วแต่สถานการณ์"><span><div class="option-text">แล้วแต่สถานการณ์</div></span></label>
                    </div>
                </div>
                <div class="question-group">
                    <label class="question-label">6. ถ้ามีฟีเจอร์ช่วยแนะนำเมนู คุณสนใจใช้หรือไม่</label>
                    <div class="options-grid">
                        <label class="radio-btn"><input type="radio" name="cb4" value="สนใจ"><span><div class="option-text">สนใจ</div></span></label>
                        <label class="radio-btn"><input type="radio" name="cb4" value="อาจใช้"><span><div class="option-text">อาจใช้</div></span></label>
                        <label class="radio-btn"><input type="radio" name="cb4" value="ไม่สนใจ"><span><div class="option-text">ไม่สนใจ</div></span></label>
                    </div>
                </div>
                <div class="question-group">
                    <label class="question-label">7. เวลาสั่ง KFC คุณมักเพิ่มของทานเล่นหรือไม่</label>
                    <div class="options-grid">
                        <label class="radio-btn"><input type="radio" name="cb5" value="บ่อย"><span><div class="option-text">บ่อย</div></span></label>
                        <label class="radio-btn"><input type="radio" name="cb5" value="บางครั้ง"><span><div class="option-text">บางครั้ง</div></span></label>
                        <label class="radio-btn"><input type="radio" name="cb5" value="ไม่ค่อย"><span><div class="option-text">ไม่ค่อย</div></span></label>
                    </div>
                </div>
                <div class="question-group">
                    <label class="question-label">8. คุณชอบเมนูที่สามารถเลือกส่วนประกอบเองได้หรือไม่</label>
                    <div class="options-grid">
                        <label class="radio-btn"><input type="radio" name="cb6" value="ชอบ"><span><div class="option-text">ชอบ</div></span></label>
                        <label class="radio-btn"><input type="radio" name="cb6" value="เฉย ๆ"><span><div class="option-text">เฉย ๆ</div></span></label>
                        <label class="radio-btn"><input type="radio" name="cb6" value="ไม่ชอบ"><span><div class="option-text">ไม่ชอบ</div></span></label>
                    </div>
                </div>
                <div class="question-group">
                    <label class="question-label">9. ปกติคุณทำอาหารทานเองบ่อยแค่ไหน</label>
                    <div class="options-grid">
                        <label class="radio-btn"><input type="radio" name="cb9" value="ทำทานเองเป็นประจำ"><span><div class="option-text">ทำทานเองเป็นประจำ</div></span></label>
                        <label class="radio-btn"><input type="radio" name="cb9" value="ทำบ้างบางครั้ง"><span><div class="option-text">ทำบ้างบางครั้ง</div></span></label>
                        <label class="radio-btn"><input type="radio" name="cb9" value="ทำนานๆครั้ง"><span><div class="option-text">ทำนานๆครั้ง</div></span></label>
                        <label class="radio-btn"><input type="radio" name="cb9" value="ไม่ทำเลยสั่งทานเอาง่ายกว่า"><span><div class="option-text">ไม่ทำเลยสั่งทานเอาง่ายกว่า</div></span></label>
                    </div>
                </div>
                <div class="question-group">
                    <label class="question-label">10. ปกติคุณยินดีรอคิวเพื่อทานร้านอาหารที่ต้องการหรือไม่?</label>
                    <div class="options-grid">
                        <label class="radio-btn"><input type="radio" name="cb10" value="ยินดีรอ ถ้าเป็นร้านที่อยากกินจริง ๆ"><span><div class="option-text">ยินดีรอ ถ้าเป็นร้านที่อยากกินจริง ๆ</div></span></label>
                        <label class="radio-btn"><input type="radio" name="cb10" value="รอได้ แต่ไม่นาน (ไม่เกิน 10-15 นาที)"><span><div class="option-text">รอได้ แต่ไม่นาน<br>(ไม่เกิน 10-15 นาที)</div></span></label>
                        <label class="radio-btn"><input type="radio" name="cb10" value="ไม่ค่อยชอบรอคิว"><span><div class="option-text">ไม่ค่อยชอบรอคิว</div></span></label>
                        <label class="radio-btn"><input type="radio" name="cb10" value="ไม่รอคิวเลยจะเลือกร้านอื่นแทน"><span><div class="option-text">ไม่รอคิวเลย<br>จะเลือกร้านอื่นแทน</div></span></label>
                    </div>
                </div>
                <div class="question-group">

                    <div class="options-grid">
                        <label class="radio-btn"><input type="radio" name="cb11" value="สะดวกและเหมาะกับไลฟ์สไตล์"><span><div class="option-text">สะดวกและเหมาะกับไลฟ์สไตล์</div></span></label>
                        <label class="radio-btn"><input type="radio" name="cb11" value="อร่อยและทานง่าย"><span><div class="option-text">อร่อยและทานง่าย</div></span></label>
                        <label class="radio-btn"><input type="radio" name="cb11" value="ทานได้เป็นครั้งคราว"><span><div class="option-text">ทานได้เป็นครั้งคราว</div></span></label>
                        <label class="radio-btn"><input type="radio" name="cb11" value="ไม่ค่อยดีต่อสุขภาพ"><span><div class="option-text">ไม่ค่อยดีต่อสุขภาพ</div></span></label>
                        <label class="radio-btn"><input type="radio" name="cb11" value="ไม่ค่อยชอบอาหารจานด่วน"><span><div class="option-text">ไม่ค่อยชอบอาหารจานด่วน</div></span></label>

            <button type="submit" id="submitBtn" class="submit-btn">ส่งคำตอบของคุณ ❤️</button>
        </form>
    </div>

    <script>
        // *** วาง URL ของเว็บแอป (Web App URL) ที่ได้จาก Google Apps Script ตรงนี้ ***
        const scriptURL = 'https://script.google.com/macros/s/AKfycbx4yRnpDDS7IwRRIJ7rh_rvDyAxf9RUrwkydalmXcvoFEISSFBiYXJwlJPRYuFGDIl8/exec';
        const form = document.getElementById('surveyForm');
        const submitBtn = document.getElementById('submitBtn');

        form.addEventListener('submit', e => {
            e.preventDefault(); // ป้องกันการเปลี่ยนหน้า
            
            // เปลี่ยนข้อความปุ่มและป้องกันการกดซ้ำ
            submitBtn.disabled = true;
            submitBtn.innerText = 'กำลังส่งข้อมูล... ⏳';

            // ใช้ FormData เก็บข้อมูลจากฟอร์มทั้งหมด 
            let requestBody = new FormData(form);

            fetch(scriptURL, { method: 'POST', body: requestBody })
                .then(response => {
                    alert('ส่งคำตอบเรียบร้อยแล้ว ขอบคุณที่ร่วมสนุกครับ! 🎉');
                    form.reset(); // ล้างฟอร์ม
                    submitBtn.disabled = false;
                    submitBtn.innerText = 'ส่งคำตอบของคุณ ❤️';
                })
                .catch(error => {
                    console.error('Error!', error.message);
                    alert('เกิดข้อผิดพลาดในการส่งข้อมูล กรุณาลองใหม่อีกครั้ง');
                    submitBtn.disabled = false;
                    submitBtn.innerText = 'ส่งคำตอบของคุณ ❤️';
                });
        });
    </script>
</body>
</html>
